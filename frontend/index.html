<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Battleship AI Arena</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="ui-layer">
            <div class="panel">
                <h1>AI Battleship</h1>
                <div class="status-box p1">
                    <h3 id="p1-status">Player 1 (Red): Waiting...</h3>
                    <p>Score: <span id="p1-score">0</span></p>
                </div>
                <div class="status-box p2">
                    <h3 id="p2-status">Player 2 (Yellow): Waiting...</h3>
                    <p>Score: <span id="p2-score">0</span></p>
                </div>
                <h2 id="turn-indicator" style="margin-top: 20px">
                    Waiting for agents...
                </h2>
            </div>
        </div>

        <div id="canvas-container">
            <div class="view-panel">
                <h3>Player 1's Fleet</h3>
                <canvas id="p1-canvas" width="400" height="400"></canvas>
            </div>
            <div class="view-panel">
                <h3>Player 2's Fleet</h3>
                <canvas id="p2-canvas" width="400" height="400"></canvas>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
