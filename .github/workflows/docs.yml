name: Generate Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          # 1. Install your project's production dependencies so pdoc can import your code.
          # (This assumes you have a requirements.txt file in your root directory)
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

          # 2. Install the documentation build tools ONLY in the runner environment.
          pip install pdoc websockets

      - name: Generate documentation
        run: |
          mkdir -p docs
          touch docs/.nojekyll

          # Safely copy the logo if it exists; if not, don't crash the workflow (|| true)
          cp frontend/favicon.svg docs/logo.svg || true

          # Generate the HTML docs for the backend and agents folders
          pdoc -o docs --logo logo.svg backend agents

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
